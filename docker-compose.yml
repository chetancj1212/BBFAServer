# ============================================================
# BBFA Server — Docker Compose
# ============================================================
# Usage:
#   docker compose up -d          → Start server
#   docker compose down           → Stop server
#   docker compose logs -f        → Watch logs
#   docker compose up -d --build  → Rebuild after code changes
# ============================================================

services:
  server:
    build: ./server
    container_name: bbfa-server
    ports:
      - "8700:8700"
    volumes:
      # Persist databases across container restarts
      - bbfa-data:/app/data
      # Cache downloaded model weights (auto-downloaded on first run)
      - bbfa-weights:/app/weights
    environment:
      - HOST=0.0.0.0
      - WORKERS=1
      - MAX_INFERENCE_CONCURRENCY=4
    restart: unless-stopped

volumes:
  bbfa-data:
    driver: local
  bbfa-weights:
    driver: local
